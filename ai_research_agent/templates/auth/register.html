{% extends "base.html" %}

{% block title %}Register - AI Research Assistant Agent{% endblock %}
{% block page_title %}Create Account{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i data-lucide="user-plus" class="auth-icon"></i>
            <h2>Join the Research Agent</h2>
            <p>Create an account to start conducting AI studies</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="key-round"></i>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i data-lucide="user-plus"></i>
                <span>Sign Up</span>
            </button>
        </form>
        
        <div class="auth-footer">
            <span>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></span>
        </div>
    </div>
</div>
{% endblock %}
