{% extends "base.html" %}

{% block title %}Login - AI Research Assistant Agent{% endblock %}
{% block page_title %}Login to Dashboard{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i data-lucide="lock" class="auth-icon"></i>
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your research space</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="key-round"></i>
                    <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i data-lucide="log-in"></i>
                <span>Sign In</span>
            </button>
        </form>
        
        <div class="auth-footer">
            <span>Don't have an account? <a href="{{ url_for('auth.register') }}">Create Account</a></span>
        </div>
    </div>
</div>
{% endblock %}
